name: flutter_chrome_cast_android
description: >
  Android implementation of the flutter_chrome_cast plugin.
  Will house the Kotlin/Pigeon native bridge once migrated in Stage 2+.
version: 1.4.4
repository: https://github.com/felnanuke2/flutter_google_cast

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.6"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_chrome_cast_platform_interface:
    version: ^1.4.4
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.5

flutter:
  plugin:
    implements: flutter_chrome_cast
    platforms:
      android:
        dartPluginClass: FlutterChromeCastAndroid
        package: com.felnanuke.google_cast
        pluginClass: GoogleCastPlugin
