name: Publish to pub.dev

on:
  push:
    tags:
      - 'flutter_chrome_cast_platform_interface-v*'
      - 'flutter_chrome_cast_android-v*'
      - 'flutter_chrome_cast_ios-v*'
      - 'flutter_chrome_cast-v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - flutter_chrome_cast_platform_interface
          - flutter_chrome_cast_android
          - flutter_chrome_cast_ios
          - flutter_chrome_cast

permissions:
  id-token: write

jobs:
  publish-platform-interface:
    if: >-
      (github.event_name == 'push' && startsWith(github.ref_name, 'flutter_chrome_cast_platform_interface-v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.package == 'flutter_chrome_cast_platform_interface')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - name: Install workspace dependencies
        run: dart pub get

      - name: Publish platform interface package
        working-directory: packages/flutter_chrome_cast_platform_interface
        run: dart pub publish --force

  publish-android:
    if: >-
      (github.event_name == 'push' && startsWith(github.ref_name, 'flutter_chrome_cast_android-v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.package == 'flutter_chrome_cast_android')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - name: Install workspace dependencies
        run: dart pub get

      - name: Publish Android package
        working-directory: packages/flutter_chrome_cast_android
        run: dart pub publish --force

  publish-ios:
    if: >-
      (github.event_name == 'push' && startsWith(github.ref_name, 'flutter_chrome_cast_ios-v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.package == 'flutter_chrome_cast_ios')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - name: Install workspace dependencies
        run: dart pub get

      - name: Publish iOS package
        working-directory: packages/flutter_chrome_cast_ios
        run: dart pub publish --force

  publish-root:
    if: >-
      (github.event_name == 'push' && startsWith(github.ref_name, 'flutter_chrome_cast-v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.package == 'flutter_chrome_cast')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - name: Install workspace dependencies
        run: dart pub get

      - name: Publish root package
        run: dart pub publish --force
