name: flutter_chrome_cast
description: A Flutter plugin for integrating Google Cast devices. Discover, connect, and control media playback on Chromecast and Cast-enabled devices.
version: 1.4.4
repository: https://github.com/felnanuke2/flutter_google_cast
license: BSD-3-Clause

environment:
  # Dart 3.6+ is required for the `workspace:` key.
  # Flutter 3.27.0 (Nov 2024) ships with Dart 3.6.
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

# ---------------------------------------------------------------------------
# Dart Workspace — Stage 1 (Folder Shuffle)
# All sub-packages share a single dependency resolution graph.
# Add new member paths here as the federation grows.
# ---------------------------------------------------------------------------
workspace:
  - example
  - packages/flutter_chrome_cast_platform_interface
  - packages/flutter_chrome_cast_android
  - packages/flutter_chrome_cast_ios

dependencies:
  flutter:
    sdk: flutter
  # Stage 1: facade depends on the (still-empty) platform interface package.
  # Real interface extraction happens in Stage 2.
  flutter_chrome_cast_platform_interface:
    path: packages/flutter_chrome_cast_platform_interface
  flutter_chrome_cast_android:
    path: packages/flutter_chrome_cast_android
  flutter_chrome_cast_ios:
    path: packages/flutter_chrome_cast_ios
  get: ^4.7.2
  marquee: ^2.2.3
  permission_handler: ^12.0.0+1
  plugin_platform_interface: ^2.1.8
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.5
  pigeon: ^25.3.2

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        default_package: flutter_chrome_cast_android
      ios:
        default_package: flutter_chrome_cast_ios